        <h2 id="一些函数的使用方法"><a href="#一些函数的使用方法" class="headerlink" title="一些函数的使用方法"></a>一些函数的使用方法</h2><h4 id="定义一个字符串：str-”abcdecfh”"><a href="#定义一个字符串：str-”abcdecfh”" class="headerlink" title="定义一个字符串：str=”abcdecfh”"></a>定义一个字符串：str=”abcdecfh”</h4><h3 id="一、字符串的判断"><a href="#一、字符串的判断" class="headerlink" title="一、字符串的判断"></a>一、字符串的判断</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">str.upper()  <span class="comment">#字符串大写</span></span><br><span class="line">lower() <span class="comment">#字符串小写</span></span><br><span class="line">capitalize（）<span class="comment">#首字母大写</span></span><br><span class="line">title（） <span class="comment"># 所有单词首字母大写</span></span><br><span class="line">isdecimal() <span class="comment">#判断是不是数字类型</span></span><br><span class="line">isdigit()<span class="comment">#判断是不是数字类型</span></span><br><span class="line">isnumeric() <span class="comment">#判断是不是数字类型</span></span><br><span class="line">isalpha() <span class="comment">#判断是不是纯字母</span></span><br><span class="line">isalnum() <span class="comment">#判断是不是字母加数字，但是字符串中不能有空格</span></span><br><span class="line">isspace() <span class="comment">#判断是不是空白符</span></span><br><span class="line">isidentifier() <span class="comment">#判断首字母的规范</span></span><br></pre></td></tr></table></figure>

<h2 id="二、字符串的扩充"><a href="#二、字符串的扩充" class="headerlink" title="二、字符串的扩充"></a>二、字符串的扩充</h2><h5 id="两边扩充"><a href="#两边扩充" class="headerlink" title="两边扩充"></a>两边扩充</h5><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">str.center(7,<span class="string">"="</span>) <span class="comment">#两边扩充“=”</span></span><br></pre></td></tr></table></figure>

<h5 id="单边扩充"><a href="#单边扩充" class="headerlink" title="单边扩充"></a>单边扩充</h5><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#单边扩充ljust:左对齐右扩充  rjust:右对齐左扩充</span></span><br><span class="line">str.ljust (8,<span class="string">"-"</span>) </span><br><span class="line">str.rjust(8,<span class="string">"-"</span>)</span><br><span class="line">str.zfill(6)    </span><br><span class="line"><span class="string">"+100"</span>.zfill(4) <span class="comment">#结果：+0100（“-”的同理）</span></span><br><span class="line">str.zfill(6).count(<span class="string">"ab"</span>)<span class="comment">#统计某一个值出现的次数</span></span><br><span class="line">str.zfill(6).count(<span class="string">"a"</span>,2)<span class="comment">#参数2代表从第几个开始找</span></span><br><span class="line">str.zfill(6).count(<span class="string">"a"</span>,2,6) <span class="comment">#6代表到哪里结束</span></span><br><span class="line">str.endswith(<span class="string">"fgh"</span>,<span class="string">"z"</span>,<span class="string">"a"</span>)、str.startswith(<span class="string">"abc"</span>) <span class="comment">#用什么开头用什么结尾,一个满足为Ture</span></span><br><span class="line">str.find(<span class="string">"abc"</span>,1) 、rfind()<span class="comment">#从左找</span></span><br></pre></td></tr></table></figure>
